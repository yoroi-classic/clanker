name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install quality prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes jq shellcheck

      - name: Run canonical quality checks
        env:
          GH_TOKEN: ""
          GITHUB_TOKEN: ""
        run: ./quality.sh
