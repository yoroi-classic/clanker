name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bubblewrap shellcheck

      - name: Enable and verify review sandbox
        run: |
          if sysctl kernel.apparmor_restrict_unprivileged_userns >/dev/null 2>&1; then
            sudo sysctl --write kernel.apparmor_restrict_unprivileged_userns=0
          fi
          if sysctl kernel.unprivileged_userns_clone >/dev/null 2>&1; then
            sudo sysctl --write kernel.unprivileged_userns_clone=1
          fi
          bwrap \
            --unshare-net \
            --unshare-pid \
            --unshare-ipc \
            --unshare-uts \
            --die-with-parent \
            --new-session \
            --ro-bind / / \
            --dev /dev \
            --proc /proc \
            -- /bin/true

      - name: Run quality checks
        run: ./scripts/quality-check.sh
